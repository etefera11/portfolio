<section class="hero">
    <div class="hero-content">
        <p class="hero-greeting">Hi, I'm</p>
        <h1 class="hero-name">{{ displayedText }}<span class="cursor" [class.hidden]="!showCursor">|</span></h1>
        <h2 class="hero-title">Software Development Lead</h2>
        <p class="hero-description">
            Enterprise .NET engineer with 5+ years building software at scale.
            Led teams delivering solutions for clients managing $1.3 trillion in assets.
        </p>
        <div class="hero-buttons">
            <a routerLink="/projects" class="btn-primary">View My Work</a>
            <a routerLink="/contact" class="btn-secondary">Get In Touch</a>
        </div>
    </div>
</section>
