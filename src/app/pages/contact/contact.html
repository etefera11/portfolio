<section class="contact">
  <div class="contact-container">
    <h1 class="section-title">Get In Touch</h1>
    <p class="contact-subtitle">Have an opportunity or just want to connect? Send me a message.</p>

    <form class="contact-form" (ngSubmit)="onSubmit()" #contactForm="ngForm">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" [(ngModel)]="formData.name" required placeholder="Your name" />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" [(ngModel)]="formData.email" required
          placeholder="your@email.com" />
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" [(ngModel)]="formData.message" required rows="6"
          placeholder="Your message..."></textarea>
      </div>
      <button type="submit" class="btn-submit" [disabled]="contactForm.invalid || sending || submitted">
        {{ submitted ? 'Message Sent!' : sending ? 'Sending...' : 'Send Message' }}
      </button>
      @if (error) {
      <p style="color: red; margin-top: 0.5rem;">{{ error }}</p>
      }
    </form>

    <div class="contact-links">
      <a href="mailto:etefera11@gmail.com">etefera11@gmail.com</a>
      <a href="https://linkedin.com/in/ezanatefera" target="_blank">LinkedIn</a>
      <a href="https://github.com/etefera11" target="_blank">GitHub</a>
    </div>
  </div>
</section>
